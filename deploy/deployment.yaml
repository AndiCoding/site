apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: frontend
          image: ghcr.io/andreasvaldal/site:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: frontend-env
