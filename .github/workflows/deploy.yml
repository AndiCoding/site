name: Pi Deployment

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        run: |
          sudo cp -r ./frontend /home/andreas/Documents/docker/website/
          sudo docker compose -f /home/andreas/Documents/docker/website/docker-compose.yml up -d --build frontend
          
